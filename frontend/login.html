<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>VantaLedger Login</title>
  <link href="https://cdn.tailwindcss.com" rel="stylesheet" />
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">
  <form id="login-form" class="bg-white p-8 rounded shadow-md w-full max-w-sm">
    <h2 class="text-2xl font-semibold mb-6 text-center">Login</h2>
    <input
      type="text"
      id="token-input"
      placeholder="Enter access token"
      class="w-full p-3 border border-gray-300 rounded mb-4 focus:outline-none focus:ring-2 focus:ring-indigo-500"
      required
    />
    <button
      type="submit"
      class="w-full bg-indigo-600 text-white py-3 rounded hover:bg-indigo-700 transition"
    >
      Login
    </button>
  </form>
  <script src="/app.js"></script>
</body>
</html>
