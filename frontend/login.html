<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>VantaLedger Login</title>
  <link href="https://cdn.tailwindcss.com" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <style>
    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    }
    .login-container {
      background: white;
      padding: 2rem;
      border-radius: 1rem;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
      width: 100%;
      max-width: 400px;
      margin: 5rem auto;
      text-align: center;
    }
    .login-container h2 {
      font-weight: 700;
      font-size: 2rem;
      margin-bottom: 1.5rem;
      color: #4a4a4a;
    }
    .input-field {
      width: 100%;
      padding: 0.75rem 1rem;
      margin-bottom: 1rem;
      border: 2px solid #ddd;
      border-radius: 0.5rem;
      font-size: 1rem;
      transition: border-color 0.3s ease;
    }
    .input-field:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 5px #667eea;
    }
    .login-button {
      background: #667eea;
      color: white;
      font-weight: 600;
      padding: 0.75rem 1rem;
      border: none;
      border-radius: 0.5rem;
      width: 100%;
      font-size: 1.1rem;
      cursor: pointer;
      transition: background 0.3s ease;
    }
    .login-button:hover {
      background: #5a67d8;
    }
    .login-icon {
      margin-right: 0.5rem;
    }
  </style>
</head>
<body>
  <div class="login-container" role="main" aria-label="Login form">
    <h2><i class="fas fa-lock login-icon"></i> VantaLedger Login</h2>
    <form id="loginForm" novalidate>
      <input
        type="text"
        id="tokenInput"
        class="input-field"
        placeholder="Enter your access token"
        aria-label="Access token"
        required
      />
      <button type="submit" class="login-button" aria-live="polite">Log In</button>
    </form>
  </div>
  <script src="/static/app.js"></script>
</body>
</html>
